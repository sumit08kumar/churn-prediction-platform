services:
  # ─── MLflow Tracking Server ─────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: churn_mlflow
    command: >
      bash -c "pip install mlflow -q &&
               apt-get update -qq && apt-get install -y -qq curl > /dev/null &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow/mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: churn_backend
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=artifacts/churn_pipeline.pkl
      - META_PATH=artifacts/model_meta.json
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - churn_net
    restart: unless-stopped

  # ─── React Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: churn_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - churn_net
    restart: unless-stopped

volumes:
  mlflow_data:

networks:
  churn_net:
    driver: bridge
