# ─────────────────────────────────────────────────────────────
# Render Blueprint — ChurnIQ Platform
# Deploy with: https://render.com/deploy
# ─────────────────────────────────────────────────────────────

services:
  # ─── FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: churniq-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: artifacts/churn_pipeline.pkl
      - key: META_PATH
        value: artifacts/model_meta.json
      - key: PYTHONUNBUFFERED
        value: "1"

  # ─── React Frontend (Static Site) ────────────────────────────
  - type: web
    name: churniq-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://churniq-backend.onrender.com
